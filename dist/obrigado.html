<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E3C38">
<title>Obrigada · Maria de Fátima Abreu</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/webp" href="/assets/img/logo-trg.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,300..500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Inter", system-ui, sans-serif; background: #FEF4EB; color: #1A2E2C; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }
  .aurora { position: fixed; inset: -20%; z-index: 0; pointer-events: none; }
  .aurora::before, .aurora::after { content: ""; position: absolute; border-radius: 50%; filter: blur(140px); }
  .aurora::before { width: 50vw; height: 50vw; background: radial-gradient(closest-side, #BECBBA, transparent); top: 5%; right: -10%; opacity: 0.55; }
  .aurora::after { width: 45vw; height: 45vw; background: radial-gradient(closest-side, #F3CFB2, transparent); bottom: -10%; left: -10%; opacity: 0.55; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; z-index: 1; }
  .inner { max-width: 620px; text-align: center; }
  .icon { width: 76px; height: 76px; margin: 0 auto 24px; border-radius: 50%; background: rgba(190,203,186,0.5); display: flex; align-items: center; justify-content: center; color: #0E3C38; animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  h1 { font-family: "Fraunces", serif; font-size: clamp(2rem, 5vw, 3rem); color: #0E3C38; line-height: 1.1; margin-bottom: 16px; font-weight: 500; letter-spacing: -0.02em; font-variation-settings: "opsz" 144; }
  h1 em { font-style: italic; font-weight: 300; }
  p { font-family: "Fraunces", serif; font-size: 1.2rem; font-style: italic; color: rgba(26,46,44,0.72); margin-bottom: 32px; line-height: 1.55; }
  a.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 999px; font-size: 15px; font-weight: 500; text-decoration: none; background: #0E3C38; color: #FEF4EB; box-shadow: 0 18px 40px -12px rgba(14,60,56,0.5); transition: all 250ms; }
  a.btn:hover { background: #0a2e2a; transform: translateY(-2px); }
  .note { font-size: 13px; color: rgba(26,46,44,0.55); margin-top: 32px; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="aurora" aria-hidden="true"></div>

<main>
  <div class="inner">
    <div class="icon">
      <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Obrigada por <em>chegar até aqui</em></h1>
    <p>Sua mensagem foi enviada. Vou responder pessoalmente pelo WhatsApp em breve.<br>Enquanto isso, respire fundo. Você já deu o primeiro passo.</p>
    <a href="/" class="btn">Voltar ao início</a>
    <p class="note">Maria de Fátima Abreu · Terapeuta TRG · CITRG 17.419</p>
  </div>
</main>

</body>
</html>
