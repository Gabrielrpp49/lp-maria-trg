<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E3C38">
<title>Obrigada · Maria de Fátima Abreu · Terapeuta TRG</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/webp" href="/assets/img/logo-trg.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; }
  .ty-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--space-xl) 20px; background: var(--creme-fundo); position: relative; overflow: hidden; }
  .ty-page::before { content: ''; position: absolute; top: -20%; right: -20%; width: 55%; aspect-ratio: 1; background: radial-gradient(circle, var(--verde-suave) 0%, transparent 65%); opacity: 0.4; pointer-events: none; }
  .ty-page::after { content: ''; position: absolute; bottom: -25%; left: -15%; width: 50%; aspect-ratio: 1; background: radial-gradient(circle, var(--bege-quente) 0%, transparent 70%); opacity: 0.35; pointer-events: none; }
  .ty-inner { position: relative; z-index: 1; text-align: center; max-width: 620px; }
  .ty-icon { width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%; background: var(--verde-suave); display: flex; align-items: center; justify-content: center; color: var(--verde-profundo); }
  .ty-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); color: var(--verde-profundo); margin-bottom: 16px; line-height: 1.15; letter-spacing: -0.015em; }
  .ty-sub { font-family: var(--font-display); font-size: 1.25rem; font-style: italic; color: var(--texto-suave); margin-bottom: 32px; line-height: 1.55; }
  .ty-note { font-size: 14px; color: var(--texto-mais-suave); margin-top: 24px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="brand">
      <img src="/assets/img/logo-trg.webp" alt="" class="brand-logo" width="44" height="44">
      <span class="brand-name">
        <span class="brand-name-line">Maria de Fátima Abreu</span>
        <span class="brand-name-role">Terapeuta TRG</span>
      </span>
    </a>
  </div>
</header>

<main class="ty-page">
  <div class="ty-inner">
    <div class="ty-icon">
      <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h1 class="ty-title">Obrigada por chegar até aqui</h1>
    <p class="ty-sub">Sua mensagem foi enviada e vou responder pessoalmente pelo WhatsApp em breve. Enquanto isso, respire fundo. Você já deu o primeiro passo.</p>
    <a href="/" class="btn btn-primary btn-lg">Voltar ao início</a>
    <p class="ty-note">Maria de Fátima Abreu · Terapeuta TRG · CITRG 17.419</p>
  </div>
</main>

</body>
</html>
